name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Finalize
        env:
          ADFB6B: ${{ secrets.ADFB6B }}
          B84AE5: ${{ secrets.B84AE5 }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('ADFB6B', '')
          bm = os.environ.get('B84AE5', '')
          count = 0
          for p in pathlib.Path('.').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s.replace('<!-- 1bb6827f4608d526e79b44a26ca745433224 -->', gm)
              s2 = s2.replace('<!-- f92a02b385f00fb1 -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0:
              sys.exit(1)
          "
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
